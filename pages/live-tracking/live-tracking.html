<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track7 - Rastreamento ao Vivo</title>
    <link rel="stylesheet" href="../global.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="../components/topnav.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            overflow: hidden;
        }

        .main {
            padding: 20px;
            height: calc(100vh - 70px);
            overflow-y: auto;
        }

        /* Mapa */
        #map {
            height: 500px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
        }

        /* Controles */
        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--card-bg-solid);
            padding: 10px 20px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        .control-group label {
            font-weight: 500;
            color: var(--text-secondary);
        }

        select, input {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
        }

        button {
            background: var(--brand-orange);
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            background: #ff8c42;
            transform: translateY(-2px);
        }

        /* Lista de veículos */
        .vehicles-panel {
            background: var(--card-bg-solid);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            height: 400px;
            overflow-y: auto;
        }

        .vehicles-panel h3 {
            margin-bottom: 15px;
            color: var(--brand-orange);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .vehicle-item {
            padding: 12px;
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .vehicle-item:hover {
            background: rgba(190, 96, 4, 0.1);
            transform: translateX(5px);
        }

        .vehicle-item.selected {
            background: rgba(190, 96, 4, 0.2);
            border-left: 3px solid var(--brand-orange);
        }

        .vehicle-info {
            flex: 1;
        }

        .vehicle-name {
            font-weight: 600;
            margin-bottom: 5px;
        }

        .vehicle-details {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .vehicle-status {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 8px;
        }

        .status-moving { background: #2ecc71; box-shadow: 0 0 5px #2ecc71; }
        .status-stopped { background: #e74c3c; }
        .status-alert { background: #f39c12; }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--card-bg-solid);
            color: var(--text-primary);
            padding: 12px 20px;
            border-radius: 8px;
            border-left: 3px solid var(--brand-orange);
            display: none;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* Grid layout */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 20px;
        }

        /* Estatísticas */
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: var(--card-bg-solid);
            border: 1px solid var(--border-color);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-card i {
            font-size: 2rem;
            color: var(--brand-orange);
            margin-bottom: 10px;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: bold;
        }

        .stat-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-top: 5px;
        }
    </style>
</head>
<body class="theme-dark">
    <top-navigation></top-navigation>

    <main class="main">
        <div class="stats-bar" id="statsBar">
            <div class="stat-card">
                <i class="fas fa-truck"></i>
                <div class="stat-value" id="totalVehicles">0</div>
                <div class="stat-label">Total de Veículos</div>
            </div>
            <div class="stat-card">
                <i class="fas fa-play-circle"></i>
                <div class="stat-value" id="movingVehicles">0</div>
                <div class="stat-label">Em Movimento</div>
            </div>
            <div class="stat-card">
                <i class="fas fa-stop-circle"></i>
                <div class="stat-value" id="stoppedVehicles">0</div>
                <div class="stat-label">Parados</div>
            </div>
            <div class="stat-card">
                <i class="fas fa-exclamation-triangle"></i>
                <div class="stat-value" id="alertVehicles">0</div>
                <div class="stat-label">Com Alertas</div>
            </div>
        </div>

        <div id="map"></div>

        <div class="controls">
            <div class="control-group">
                <label>Filtrar por status:</label>
                <select id="statusFilter" onchange="filterVehicles()">
                    <option value="all">Todos</option>
                    <option value="moving">Em movimento</option>
                    <option value="stopped">Parados</option>
                    <option value="alert">Com alertas</option>
                </select>
            </div>
            <div class="control-group">
                <label>Atualização:</label>
                <button onclick="toggleAutoRefresh()">
                    <i class="fas" id="refreshIcon"></i> <span id="refreshText">Auto atualizar</span>
                </button>
            </div>
            <div class="control-group">
                <button onclick="refreshData()">
                    <i class="fas fa-sync-alt"></i> Atualizar agora
                </button>
            </div>
        </div>

        <div class="dashboard-grid">
            <div id="map"></div>
            <div class="vehicles-panel">
                <h3><i class="fas fa-list"></i> Veículos Online</h3>
                <div id="vehiclesList"></div>
            </div>
        </div>
    </main>

    <div class="toast" id="toast"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <script>
        let map;
        let markers = {};
        let vehicles = [];
        let autoRefreshInterval = null;
        let isAutoRefreshing = true;

        // Inicialização
        document.addEventListener('DOMContentLoaded', () => {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            document.body.className = `theme-${savedTheme}`;
            
            initMap();
            loadVehicles();
            
            if (isAutoRefreshing) {
                startAutoRefresh();
            }
        });

        document.addEventListener('themeChanged', (e) => {
            document.body.className = `theme-${e.detail.theme}`;
        });

        function initMap() {
            map = L.map('map').setView([-23.5505, -46.6333], 12);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> & CartoDB',
                subdomains: 'abcd',
                maxZoom: 19
            }).addTo(map);
        }

        async function loadVehicles() {
            try {
                showToast('Carregando veículos...', 2000);
                
                const response = await fetch('/api/vehicles');
                if (!response.ok) throw new Error('Erro ao carregar veículos');
                
                const data = await response.json();
                
                if (data.success) {
                    vehicles = data.vehicles;
                    updateStats();
                    filterVehicles();
                    updateMapMarkers();
                    showToast(`${vehicles.length} veículos carregados`, 3000);
                } else {
                    throw new Error(data.error);
                }
            } catch (error) {
                console.error('Erro ao carregar veículos:', error);
                showToast('Erro ao conectar com o servidor', 4000);
                document.getElementById('vehiclesList').innerHTML = '<div style="text-align:center;padding:20px;">❌ Erro ao carregar veículos</div>';
            }
        }

        function updateStats() {
            const total = vehicles.length;
            const moving = vehicles.filter(v => v.is_moving).length;
            const stopped = total - moving;
            const alerts = vehicles.filter(v => v.speed > 80 || v.rpm > 3500).length;
            
            document.getElementById('totalVehicles').textContent = total;
            document.getElementById('movingVehicles').textContent = moving;
            document.getElementById('stoppedVehicles').textContent = stopped;
            document.getElementById('alertVehicles').textContent = alerts;
        }

        function filterVehicles() {
            const filter = document.getElementById('statusFilter').value;
            let filtered = [...vehicles];
            
            switch(filter) {
                case 'moving':
                    filtered = vehicles.filter(v => v.is_moving);
                    break;
                case 'stopped':
                    filtered = vehicles.filter(v => !v.is_moving);
                    break;
                case 'alert':
                    filtered = vehicles.filter(v => v.speed > 80 || v.rpm > 3500);
                    break;
            }
            
            updateVehiclesList(filtered);
        }

        function updateVehiclesList(vehiclesList) {
            const container = document.getElementById('vehiclesList');
            
            if (vehiclesList.length === 0) {
                container.innerHTML = '<div style="text-align:center;padding:20px;">Nenhum veículo encontrado</div>';
                return;
            }
            
            container.innerHTML = vehiclesList.map(vehicle => `
                <div class="vehicle-item" onclick="centerOnVehicle('${vehicle.id}')">
                    <div class="vehicle-info">
                        <div class="vehicle-name">
                            <span class="vehicle-status ${vehicle.is_moving ? 'status-moving' : 'status-stopped'}"></span>
                            ${vehicle.name}
                        </div>
                        <div class="vehicle-details">
                            Vel: ${vehicle.speed} km/h | RPM: ${vehicle.rpm}
                            ${vehicle.speed > 80 ? '⚠️' : ''}
                            ${vehicle.rpm > 3500 ? '⚠️' : ''}
                        </div>
                        <div class="vehicle-details">
                            Lat: ${vehicle.lat?.toFixed(6)} | Lon: ${vehicle.lng?.toFixed(6)}
                        </div>
                    </div>
                    <div>
                        <i class="fas fa-crosshairs" style="color: var(--brand-orange);"></i>
                    </div>
                </div>
            `).join('');
        }

        function updateMapMarkers() {
            // Remove marcadores antigos
            Object.values(markers).forEach(marker => map.removeLayer(marker));
            markers = {};
            
            // Adiciona novos marcadores
            vehicles.forEach(vehicle => {
                if (vehicle.lat && vehicle.lng) {
                    const markerColor = vehicle.speed > 80 || vehicle.rpm > 3500 ? 'red' : 
                                       vehicle.is_moving ? 'green' : 'gray';
                    
                    const marker = L.marker([vehicle.lat, vehicle.lng], {
                        icon: L.divIcon({
                            className: 'custom-div-icon',
                            html: `<div style="background-color: ${markerColor}; width: 12px; height: 12px; border-radius: 50%; border: 2px solid white;"></div>`,
                            iconSize: [12, 12],
                            popupAnchor: [0, -6]
                        })
                    }).bindPopup(`
                        <strong>${vehicle.name}</strong><br>
                        Velocidade: ${vehicle.speed} km/h<br>
                        RPM: ${vehicle.rpm}<br>
                        Status: ${vehicle.status}<br>
                        Última atualização: ${new Date(vehicle.lastUpdate).toLocaleString()}
                    `);
                    
                    marker.addTo(map);
                    markers[vehicle.id] = marker;
                }
            });
            
            // Ajusta o zoom para mostrar todos os veículos se houver pelo menos um
            if (vehicles.length > 0 && Object.keys(markers).length > 0) {
                const bounds = L.latLngBounds(Object.values(markers).map(m => m.getLatLng()));
                map.fitBounds(bounds);
            }
        }

        function centerOnVehicle(vehicleId) {
            const vehicle = vehicles.find(v => v.id === vehicleId);
            if (vehicle && vehicle.lat && vehicle.lng) {
                map.setView([vehicle.lat, vehicle.lng], 15);
                if (markers[vehicleId]) {
                    markers[vehicleId].openPopup();
                }
                showToast(`Centralizando em ${vehicle.name}`, 2000);
            }
        }

        async function refreshData() {
            showToast('Atualizando dados...', 1000);
            await loadVehicles();
        }

        function startAutoRefresh() {
            if (autoRefreshInterval) clearInterval(autoRefreshInterval);
            autoRefreshInterval = setInterval(() => {
                if (isAutoRefreshing) {
                    loadVehicles();
                }
            }, 10000); // Atualiza a cada 10 segundos
        }

        function toggleAutoRefresh() {
            isAutoRefreshing = !isAutoRefreshing;
            const icon = document.getElementById('refreshIcon');
            const text = document.getElementById('refreshText');
            
            if (isAutoRefreshing) {
                icon.className = 'fas fa-pause';
                text.textContent = 'Auto atualizar (ON)';
                startAutoRefresh();
                showToast('Auto atualização ativada', 2000);
            } else {
                icon.className = 'fas fa-play';
                text.textContent = 'Auto atualizar (OFF)';
                if (autoRefreshInterval) {
                    clearInterval(autoRefreshInterval);
                    autoRefreshInterval = null;
                }
                showToast('Auto atualização desativada', 2000);
            }
        }

        function showToast(message, duration = 3000) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.style.display = 'block';
            setTimeout(() => {
                toast.style.display = 'none';
            }, duration);
        }

        // Carrega alertas e eventos (opcional)
        async function loadAlerts() {
            try {
                const response = await fetch('/api/alerts');
                if (response.ok) {
                    const data = await response.json();
                    if (data.success && data.alerts.length > 0) {
                        showToast(`${data.alerts.length} alertas ativos!`, 5000);
                    }
                }
            } catch (error) {
                console.error('Erro ao carregar alertas:', error);
            }
        }

        // Carrega alertas periodicamente
        setInterval(loadAlerts, 30000);
    </script>
</body>
</html>
