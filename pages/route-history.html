<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="../public/meet360.png">
    <title>Track7 - Histórico de Rastreamento</title>
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="topnav.js"></script>
    <style>
        /* Estilos específicos para o histórico de rota */
        :root {
            --timeline-bg: rgba(255, 255, 255, 0.1);
            --timeline-border: rgba(255, 255, 255, 0.2);
        }

        body.theme-light {
            --timeline-bg: rgba(0, 0, 0, 0.05);
            --timeline-border: rgba(0, 0, 0, 0.1);
        }

        .layout {
            display: flex;
            height: calc(100vh - 120px);
            position: relative;
        }

        .control-panel {
            width: 320px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
        }

        .panel-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .panel-header h2 {
            font-size: 1.2rem;
            margin-bottom: 15px;
            color: var(--text-primary);
        }

        .vehicle-selector {
            width: 100%;
            padding: 10px;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 14px;
            margin-bottom: 15px;
        }

        .date-range {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .date-input {
            flex: 1;
        }

        .date-input label {
            display: block;
            font-size: 11px;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        .date-input input {
            width: 100%;
            padding: 8px;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            color: var(--text-primary);
            font-size: 12px;
        }

        .time-presets {
            display: flex;
            gap: 5px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .preset-btn {
            flex: 1;
            min-width: 60px;
            padding: 6px;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            color: var(--text-secondary);
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .preset-btn:hover {
            background: var(--brand-orange);
            color: white;
            border-color: var(--brand-orange);
        }

        .preset-btn.active {
            background: var(--brand-orange);
            color: white;
            border-color: var(--brand-orange);
        }

        .playback-controls {
            display: flex;
            gap: 10px;
            margin: 20px 0;
            justify-content: center;
        }

        .playback-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--brand-orange);
            border: none;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .playback-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(242, 101, 34, 0.3);
        }

        .playback-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .timeline-container {
            padding: 20px;
            background: var(--timeline-bg);
            border-radius: 8px;
            margin: 0 20px 20px 20px;
        }

        .timeline-slider {
            width: 100%;
            height: 4px;
            appearance: none;
            background: var(--border-color);
            border-radius: 2px;
            outline: none;
        }

        .timeline-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: var(--brand-orange);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(242, 101, 34, 0.5);
            transition: all 0.2s;
        }

        .timeline-slider::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        .timeline-labels {
            display: flex;
            justify-content: space-between;
            margin-top: 8px;
            font-size: 11px;
            color: var(--text-secondary);
        }

        .route-info {
            padding: 15px;
            background: var(--bg-primary);
            border-radius: 8px;
            margin: 0 20px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 13px;
        }

        .info-label {
            color: var(--text-secondary);
        }

        .info-value {
            color: var(--text-primary);
            font-weight: 600;
        }

        .info-value.highlight {
            color: var(--brand-orange);
        }

        .map-container {
            flex: 1;
            position: relative;
            background: var(--map-bg);
        }

        #historyMap {
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .map-status {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: var(--bg-primary);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 12px;
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
            backdrop-filter: blur(5px);
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #2ecc71;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                opacity: 1;
                transform: scale(1);
            }

            50% {
                opacity: 0.5;
                transform: scale(1.2);
            }

            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        .speed-indicator {
            position: absolute;
            top: 20px;
            right: 20px;
            background: var(--bg-primary);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            backdrop-filter: blur(5px);
            z-index: 1000;
            text-align: center;
            min-width: 120px;
        }

        .speed-value {
            font-size: 28px;
            font-weight: bold;
            color: var(--brand-orange);
        }

        .speed-unit {
            font-size: 12px;
            color: var(--text-secondary);
            margin-left: 2px;
        }

        .speed-label {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 5px;
        }

        .waypoint-marker {
            background: var(--brand-orange);
            width: 12px;
            height: 12px;
            border-radius: 50%;
            border: 3px solid white;
            box-shadow: 0 0 10px rgba(242, 101, 34, 0.5);
        }

        .start-marker {
            background: #2ecc71;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 3px solid white;
            box-shadow: 0 0 10px rgba(46, 204, 113, 0.5);
        }

        .end-marker {
            background: #e74c3c;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 3px solid white;
            box-shadow: 0 0 10px rgba(231, 76, 60, 0.5);
        }

        .vehicle-position-marker {
            background: var(--brand-orange);
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 3px solid white;
            box-shadow: 0 0 20px var(--brand-orange);
            animation: bounce 1s infinite;
        }

        @keyframes bounce {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-5px);
            }
        }

        /* Barra de rolagem na sidebar */
        .control-panel {
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--brand-orange) var(--bg-primary);
        }

        .control-panel::-webkit-scrollbar {
            width: 6px;
        }

        .control-panel::-webkit-scrollbar-thumb {
            background-color: var(--brand-orange);
            border-radius: 10px;
        }

        /* Estilo para Marcadores de Eventos no Mapa */
        .event-marker-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            color: white;
            font-size: 10px;
            border: 2px solid white;
            box-shadow: 0 0 5px rgba(0, 0, 0, 0.3);
        }

        .event-speeding {
            background: #e74c3c;
        }

        .event-stop {
            background: #3498db;
        }

        /* Ajuste nos controles de reprodução */
        .playback-speed-selector {
            display: flex;
            justify-content: center;
            gap: 5px;
            margin-top: 10px;
        }

        .speed-btn {
            padding: 4px 8px;
            font-size: 11px;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            border-radius: 4px;
            cursor: pointer;
        }

        .speed-btn.active {
            background: var(--brand-orange);
            color: white;
        }
    </style>
</head>

<body class="theme-dark">
    <top-navigation></top-navigation>

    <!-- Breadcrumb / Tabs -->
    <div class="breadcrumb-bar">
        <span class="tab" onclick="location.href='live-tracking.html'">Rastreamento ao Vivo</span>
        <span class="tab active">Histórico de Rastreamento</span>
        <span class="tab">Geocercas</span>
        <span class="tab">Alertas</span>
        <div class="org-selector">
            <span>Organização:</span>
            <select id="orgSelector" onchange="changeOrganization(this)">
                <option>BR-Track7-Brazil / Track7 BR - Betânia</option>
                <option>BR-Track7-Brazil / Track7 BR - Sul</option>
                <option>BR-Track7-Brazil / Track7 BR - Norte</option>
            </select>
        </div>
    </div>

    <div class="layout">
        <!-- Painel de Controle -->
        <aside class="control-panel">
            <div class="panel-header">
                <h2><i class="fas fa-history" style="margin-right: 8px;"></i> Histórico de Rotas</h2>

                <select class="vehicle-selector" id="vehicleSelector" onchange="loadRouteHistory()">
                    <option value="">Selecione um veículo...</option>
                </select>

                <div class="date-range">
                    <div class="date-input">
                        <label>DATA INÍCIO</label>
                        <input type="date" id="startDate" onchange="loadRouteHistory()">
                    </div>
                    <div class="date-input">
                        <label>DATA FIM</label>
                        <input type="date" id="endDate" onchange="loadRouteHistory()">
                    </div>
                </div>

                <div class="time-presets">
                    <button class="preset-btn" onclick="setTimePreset('today')">Hoje</button>
                    <button class="preset-btn" onclick="setTimePreset('yesterday')">Ontem</button>
                    <button class="preset-btn" onclick="setTimePreset('week')">7 dias</button>
                    <button class="preset-btn" onclick="setTimePreset('month')">30 dias</button>
                </div>

                <div class="playback-controls">
                    <button class="playback-btn" onclick="playbackStart()" id="playBtn" disabled>
                        <i class="fas fa-play"></i>
                    </button>
                    <button class="playback-btn" onclick="playbackPause()" id="pauseBtn" disabled>
                        <i class="fas fa-pause"></i>
                    </button>
                    <button class="playback-btn" onclick="playbackStop()" id="stopBtn" disabled>
                        <i class="fas fa-stop"></i>
                    </button>
                </div>

                <div class="playback-speed-selector">
                    <button class="speed-btn active" onclick="setPlaybackMultiplier(1, this)">1x</button>
                    <button class="speed-btn" onclick="setPlaybackMultiplier(2, this)">2x</button>
                    <button class="speed-btn" onclick="setPlaybackMultiplier(4, this)">4x</button>
                    <button class="speed-btn" onclick="setPlaybackMultiplier(8, this)">8x</button>
                </div>
            </div>

            <!-- Timeline -->
            <div class="timeline-container">
                <input type="range" class="timeline-slider" id="timelineSlider" min="0" max="100" value="0" step="1"
                    oninput="timelineUpdate(this.value)" disabled>
                <div class="timeline-labels">
                    <span id="timeStart">--:--:--</span>
                    <span id="timeCurrent">--:--:--</span>
                    <span id="timeEnd">--:--:--</span>
                </div>
            </div>

            <!-- Informações da Rota -->
            <div class="route-info">
                <div class="info-row">
                    <span class="info-label">Distância total:</span>
                    <span class="info-value" id="totalDistance">0 km</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Duração:</span>
                    <span class="info-value" id="totalDuration">00:00:00</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Vel. média:</span>
                    <span class="info-value" id="avgSpeed">0 km/h</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Vel. máxima:</span>
                    <span class="info-value highlight" id="maxSpeed">0 km/h</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Paradas:</span>
                    <span class="info-value" id="stops">0</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Consumo:</span>
                    <span class="info-value" id="fuelConsumption">0 L</span>
                </div>
            </div>
        </aside>

        <!-- Área do Mapa -->
        <main class="map-container">
            <div id="historyMap"></div>

            <div class="speed-indicator" id="speedIndicator" style="display: none;">
                <div class="speed-value" id="currentSpeed">0</div>
                <div class="speed-label">VELOCIDADE ATUAL</div>
            </div>

            <div class="map-status">
                <span class="status-dot"></span>
                <span id="mapStatus">Selecione um veículo e período</span>
            </div>
        </main>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        // Configuração da API
        const API = 'http://localhost:5000/api';
        let map;
        let routeLayer;
        let currentMarker;
        let startMarker;
        let endMarker;
        let waypoints = [];
        let currentWaypointIndex = 0;
        let playbackInterval;
        let isPlaying = false;
        let vehicles = [];
        let currentRoute = [];
        let theme = localStorage.getItem('theme') || 'dark';
        let playbackMultiplier = 1; // Multiplicador de velocidade
        let eventLayers; // Grupo para limpar ícones de eventos facilmente

        // Inicialização
        document.addEventListener('DOMContentLoaded', async () => {
            document.body.className = `theme-${theme}`;

            // Ouvir mudanças de tema
            document.addEventListener('themeChanged', (e) => {
                theme = e.detail.theme;
                document.body.className = `theme-${theme}`;
                updateMapTheme();
            });

            initMap();
            await loadVehicles();
            setDefaultDates();
        });

        function initMap() {
            const mapConfig = {
                zoomControl: true,
                attributionControl: true
            };

            map = L.map('historyMap', mapConfig).setView([-22.2568, -45.7035], 13);

            // Configurar camada base baseada no tema
            updateMapTheme();

            // Adicionar escala
            L.control.scale({ imperial: false, metric: true }).addTo(map);

            // Inicializar layer group de eventos
            eventLayers = L.layerGroup().addTo(map);
        }

        function updateMapTheme() {
            // Remover camadas existentes
            map.eachLayer((layer) => {
                if (layer instanceof L.TileLayer) {
                    map.removeLayer(layer);
                }
            });

            // Adicionar camada apropriada para o tema
            if (theme === 'light') {
                L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
                    attribution: '© OpenStreetMap, © CartoDB'
                }).addTo(map);
            } else {
                L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                    attribution: '© OpenStreetMap, © CartoDB'
                }).addTo(map);
            }
        }

        async function loadVehicles() {
            try {
                // Autenticar primeiro
                await authenticate();

                const response = await fetch(`${API}/units`);
                const data = await response.json();

                if (data.units) {
                    vehicles = data.units;
                    const selector = document.getElementById('vehicleSelector');

                    vehicles.forEach(vehicle => {
                        const option = document.createElement('option');
                        option.value = vehicle.id;
                        option.textContent = `${vehicle.name} - ${vehicle.label || 'SEM PLACA'}`;
                        selector.appendChild(option);
                    });
                }
            } catch (error) {
                console.error('Erro ao carregar veículos:', error);
                loadSimulatedVehicles();
            }
        }

        function loadSimulatedVehicles() {
            vehicles = [
                { id: 1, name: '1658 - M.B. - OF 1722', label: 'ABC-1D34' },
                { id: 2, name: '1659 - M.B. - OF 1418', label: 'DEF-5E78' },
                { id: 3, name: '3000 - M.B. - OF 1722', label: 'GHI-9F12' },
                { id: 4, name: '3001 - VW - 17-230 OD', label: 'JKL-3G56' },
                { id: 5, name: '3002 - Scania - R 450', label: 'MNO-7H90' }
            ];

            const selector = document.getElementById('vehicleSelector');
            vehicles.forEach(vehicle => {
                const option = document.createElement('option');
                option.value = vehicle.id;
                option.textContent = `${vehicle.name} - ${vehicle.label}`;
                selector.appendChild(option);
            });
        }

        async function authenticate() {
            try {
                await fetch(`${API}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        token: '67eba42da80819eb285dd8794678964707481B6FFB3E065405FE46F889143875DE5B3C3A'
                    })
                });
            } catch (error) {
                console.warn('Autenticação falhou, usando dados simulados');
            }
        }

        function setDefaultDates() {
            const today = new Date();
            const yesterday = new Date(today);
            yesterday.setDate(yesterday.getDate() - 1);

            document.getElementById('startDate').value = yesterday.toISOString().split('T')[0];
            document.getElementById('endDate').value = today.toISOString().split('T')[0];
        }

        function setTimePreset(preset) {
            const endDate = new Date();
            const startDate = new Date();

            switch (preset) {
                case 'today':
                    startDate.setHours(0, 0, 0, 0);
                    endDate.setHours(23, 59, 59, 999);
                    break;
                case 'yesterday':
                    startDate.setDate(startDate.getDate() - 1);
                    startDate.setHours(0, 0, 0, 0);
                    endDate.setDate(endDate.getDate() - 1);
                    endDate.setHours(23, 59, 59, 999);
                    break;
                case 'week':
                    startDate.setDate(startDate.getDate() - 7);
                    break;
                case 'month':
                    startDate.setMonth(startDate.getMonth() - 1);
                    break;
            }

            document.getElementById('startDate').value = startDate.toISOString().split('T')[0];
            document.getElementById('endDate').value = endDate.toISOString().split('T')[0];

            loadRouteHistory();
        }

        function setPlaybackMultiplier(multiplier, btn) {
            playbackMultiplier = multiplier;
            // UI Update
            document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            // Se estiver tocando, reinicia o intervalo com a nova velocidade
            if (isPlaying) {
                playbackPause();
                playbackStart();
            }
        }

        async function loadRouteHistory() {
            const vehicleId = document.getElementById('vehicleSelector').value;
            const dateStart = document.getElementById('startDate').value;
            const dateEnd = document.getElementById('endDate').value;

            if (!vehicleId) {
                showToast('Selecione um veículo');
                return;
            }

            showToast('Buscando telemetria...', 2000);

            try {
                // Converte as datas dos inputs para timestamps Unix (segundos)
                const timeFrom = Math.floor(new Date(dateStart + "T00:00:00").getTime() / 1000);
                const timeTo = Math.floor(new Date(dateEnd + "T23:59:59").getTime() / 1000);

                const response = await fetch(`${API}/messages`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        unitId: parseInt(vehicleId),
                        timeFrom: timeFrom,
                        timeTo: timeTo,
                        msgType: 1, // Mensagens de posição
                        maxCount: 1000 // Limite para não travar o browser
                    })
                });

                const data = await response.json();

                if (data.messages && data.messages.length > 0) {
                    const formattedRoute = processMessages(data.messages);
                    displayRoute(formattedRoute);

                    document.getElementById('playBtn').disabled = false;
                    document.getElementById('timelineSlider').disabled = false;
                    updateMapStatus(`Rota carregada: ${data.messages.length} pontos`);
                } else {
                    showToast('Nenhum dado encontrado para este período.');
                }

            } catch (error) {
                console.error('Erro na requisição:', error);
                showToast('❌ Erro ao carregar dados do servidor.');
            }
        }

        // Função auxiliar para transformar mensagens brutas em objeto de rota
        function processMessages(messages) {
            const points = messages.map(msg => ({
                lat: msg.pos.y,
                lng: msg.pos.x,
                speed: msg.pos.s || 0,
                timestamp: new Date(msg.t * 1000).toISOString()
            }));

            // Cálculos básicos (estimativas)
            const maxSpeed = Math.max(...points.map(p => p.speed));
            const avgSpeed = points.reduce((acc, p) => acc + p.speed, 0) / points.length;

            return {
                points: points,
                startTime: points[0].timestamp,
                endTime: points[points.length - 1].timestamp,
                totalDistance: (points.length * 0.15).toFixed(1), // Estimativa baseada em pontos
                avgSpeed: Math.round(avgSpeed),
                maxSpeed: Math.round(maxSpeed),
                stops: points.filter(p => p.speed === 0).length,
                fuelConsumption: "--"
            };
        }

        async function fetchRouteData(vehicleId) {
            // Implementar chamada real à API quando disponível
            // Por enquanto, retorna dados simulados
            return generateSimulatedRoute();
        }

        function generateSimulatedRoute() {
            const points = [];
            const centerLat = -22.2568;
            const centerLng = -45.7035;

            // Gerar uma rota circular
            for (let i = 0; i < 50; i++) {
                const angle = (i / 50) * Math.PI * 2;
                const radius = 0.02;

                points.push({
                    lat: centerLat + Math.sin(angle) * radius,
                    lng: centerLng + Math.cos(angle) * radius,
                    speed: 30 + Math.sin(angle * 4) * 20,
                    timestamp: new Date(Date.now() - (50 - i) * 60000).toISOString()
                });
            }

            return {
                points: points,
                startTime: points[0].timestamp,
                endTime: points[points.length - 1].timestamp,
                totalDistance: 45.3,
                avgSpeed: 42,
                maxSpeed: 87,
                stops: 3,
                fuelConsumption: 12.5
            };
        }

        function displayRoute(routeData) {
            // Limpar camadas anteriores
            if (routeLayer) map.removeLayer(routeLayer);
            if (startMarker) map.removeLayer(startMarker);
            if (endMarker) map.removeLayer(endMarker);
            if (currentMarker) map.removeLayer(currentMarker);
            if (eventLayers) eventLayers.clearLayers(); // Limpa eventos anteriores

            currentRoute = routeData.points;
            waypoints = routeData.points;

            // Criar linha da rota
            const latlngs = routeData.points.map(p => [p.lat, p.lng]);

            // Determinar cor da linha baseada na velocidade
            routeLayer = L.polyline(latlngs, {
                color: theme === 'light' ? '#f26522' : '#f26522',
                weight: 4,
                opacity: 0.8,
                lineJoin: 'round'
            }).addTo(map);

            // Adicionar marcadores de velocidade ao longo da rota
            routeData.points.forEach((point, index) => {
                if (index % 5 === 0) { // A cada 5 pontos
                    const speedColor = point.speed > 80 ? '#e74c3c' : '#2ecc71';
                    L.circleMarker([point.lat, point.lng], {
                        radius: 3,
                        color: speedColor,
                        fillColor: speedColor,
                        fillOpacity: 0.8
                    }).addTo(map);
                }
            });

            // Adicionar marcadores de eventos
            routeData.points.forEach((point, index) => {
                // Exemplo: Ícone de Excesso de Velocidade (> 80km/h)
                if (point.speed > 80) {
                    L.marker([point.lat, point.lng], {
                        icon: L.divIcon({
                            className: 'event-marker-icon event-speeding',
                            html: '<i class="fas fa-bolt"></i>',
                            iconSize: [20, 20],
                            iconAnchor: [10, 10]
                        })
                    }).bindTooltip(`Excesso de Velocidade: ${Math.round(point.speed)} km/h`).addTo(eventLayers);
                }

                // Exemplo: Ícone de Parada (Velocidade 0 por algum tempo)
                // Aqui você pode melhorar a lógica checando o tempo parado
                if (point.speed === 0 && index % 10 === 0) {
                    L.marker([point.lat, point.lng], {
                        icon: L.divIcon({
                            className: 'event-marker-icon event-stop',
                            html: '<i class="fas fa-parking"></i>',
                            iconSize: [20, 20],
                            iconAnchor: [10, 10]
                        })
                    }).bindTooltip('Ponto de Parada').addTo(eventLayers);
                }
            });

            // Marcador de início
            startMarker = L.marker([routeData.points[0].lat, routeData.points[0].lng], {
                icon: L.divIcon({
                    className: 'custom-div-icon',
                    html: '<div class="start-marker"></div>',
                    iconSize: [16, 16],
                    iconAnchor: [8, 8]
                })
            }).addTo(map).bindTooltip('Início da rota', { permanent: false });

            // Marcador de fim
            endMarker = L.marker([routeData.points[routeData.points.length - 1].lat, routeData.points[routeData.points.length - 1].lng], {
                icon: L.divIcon({
                    className: 'custom-div-icon',
                    html: '<div class="end-marker"></div>',
                    iconSize: [16, 16],
                    iconAnchor: [8, 8]
                })
            }).addTo(map).bindTooltip('Fim da rota', { permanent: false });

            // Marcador da posição atual (início)
            currentMarker = L.marker([routeData.points[0].lat, routeData.points[0].lng], {
                icon: L.divIcon({
                    className: 'custom-div-icon',
                    html: '<div class="vehicle-position-marker"></div>',
                    iconSize: [20, 20],
                    iconAnchor: [10, 10]
                })
            }).addTo(map);

            // Ajustar zoom para mostrar toda a rota
            map.fitBounds(routeLayer.getBounds(), { padding: [50, 50] });

            // Atualizar timeline
            updateTimelineRange();

            // Atualizar informações
            document.getElementById('totalDistance').textContent = routeData.totalDistance + ' km';
            document.getElementById('avgSpeed').textContent = routeData.avgSpeed + ' km/h';
            document.getElementById('maxSpeed').textContent = routeData.maxSpeed + ' km/h';
            document.getElementById('stops').textContent = routeData.stops;
            document.getElementById('fuelConsumption').textContent = routeData.fuelConsumption + ' L';

            // Calcular duração
            const duration = calculateDuration(routeData.startTime, routeData.endTime);
            document.getElementById('totalDuration').textContent = duration;

            // Atualizar labels de tempo
            document.getElementById('timeStart').textContent = formatTime(routeData.startTime);
            document.getElementById('timeEnd').textContent = formatTime(routeData.endTime);
            document.getElementById('timeCurrent').textContent = formatTime(routeData.startTime);

            // Mostrar speed indicator
            document.getElementById('speedIndicator').style.display = 'block';
            updateCurrentSpeed(routeData.points[0].speed);
        }

        function updateTimelineRange() {
            const slider = document.getElementById('timelineSlider');
            slider.max = waypoints.length - 1;
            slider.value = 0;
        }

        function timelineUpdate(value) {
            if (!waypoints.length) return;

            const index = parseInt(value);
            currentWaypointIndex = index;

            const waypoint = waypoints[index];
            if (!waypoint) return;

            // Atualizar posição do marcador
            currentMarker.setLatLng([waypoint.lat, waypoint.lng]);

            // Atualizar tempo atual
            document.getElementById('timeCurrent').textContent = formatTime(waypoint.timestamp);

            // Atualizar velocidade
            updateCurrentSpeed(waypoint.speed);

            // Mover mapa suavemente
            map.panTo([waypoint.lat, waypoint.lng]);
        }

        function updateCurrentSpeed(speed) {
            document.getElementById('currentSpeed').textContent = Math.round(speed);

            // Mudar cor baseada na velocidade
            const speedElement = document.getElementById('currentSpeed');
            if (speed > 80) {
                speedElement.style.color = '#e74c3c';
            } else {
                speedElement.style.color = 'var(--brand-orange)';
            }
        }

        function formatTime(timestamp) {
            const date = new Date(timestamp);
            return date.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }

        function calculateDuration(start, end) {
            const startDate = new Date(start);
            const endDate = new Date(end);
            const diffMs = endDate - startDate;
            const diffHrs = Math.floor(diffMs / 3600000);
            const diffMins = Math.floor((diffMs % 3600000) / 60000);
            const diffSecs = Math.floor((diffMs % 60000) / 1000);

            return `${String(diffHrs).padStart(2, '0')}:${String(diffMins).padStart(2, '0')}:${String(diffSecs).padStart(2, '0')}`;
        }

        function playbackStart() {
            if (!waypoints.length || currentWaypointIndex >= waypoints.length - 1) {
                currentWaypointIndex = 0;
            }

            isPlaying = true;
            document.getElementById('playBtn').disabled = true;
            document.getElementById('pauseBtn').disabled = false;
            document.getElementById('stopBtn').disabled = false;

            // A velocidade base de 1000ms é dividida pelo multiplicador
            const intervalTime = 1000 / playbackMultiplier;

            playbackInterval = setInterval(() => {
                if (currentWaypointIndex < waypoints.length - 1) {
                    currentWaypointIndex++;
                    document.getElementById('timelineSlider').value = currentWaypointIndex;
                    timelineUpdate(currentWaypointIndex);
                } else {
                    playbackStop();
                }
            }, intervalTime);
        }

        function playbackPause() {
            isPlaying = false;
            clearInterval(playbackInterval);

            document.getElementById('playBtn').disabled = false;
            document.getElementById('pauseBtn').disabled = true;
        }

        function playbackStop() {
            isPlaying = false;
            clearInterval(playbackInterval);

            currentWaypointIndex = 0;
            document.getElementById('timelineSlider').value = 0;
            timelineUpdate(0);

            document.getElementById('playBtn').disabled = false;
            document.getElementById('pauseBtn').disabled = true;
            document.getElementById('stopBtn').disabled = true;
        }

        function updateMapStatus(message) {
            document.getElementById('mapStatus').textContent = message;
        }

        function changeOrganization(select) {
            showToast('Organização alterada: ' + select.value);
        }

        function showToast(msg, duration = 3000) {
            const toast = document.getElementById('toast');
            toast.innerHTML = msg;
            toast.style.display = 'block';

            clearTimeout(window._toastTimer);
            window._toastTimer = setTimeout(() => {
                toast.style.display = 'none';
            }, duration);
        }
    </script>
</body>
